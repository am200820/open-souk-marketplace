version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: open-souk-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - open-souk-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: open-souk-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/open-souk?authSource=admin
      JWT_SECRET: your_jwt_secret_key
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - open-souk-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open-souk-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - open-souk-network

volumes:
  mongodb_data:

networks:
  open-souk-network:
    driver: bridge
